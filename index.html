<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ブラックチャンネルのキャラクター情報を素早く確認・検索できるファンサイト。">
  <title>BCキャラ情報</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1 id="main-title">BCキャラ情報</h1>
      <p>誕生日と身長確認用</p>
    </header>

    <main>
      <!-- 1. カレンダー -->
      <section class="calendar-section" id="calendar-section" aria-label="カレンダー">
        <h2>カレンダー</h2>
        <div class="calendar-layout">
          <div class="calendar-main">
            <div class="calendar-controls">
              <button id="prev-month-btn" aria-label="前月">&lt;</button>
              <span id="calendar-month-year">2026年 6月</span>
              <button id="next-month-btn" aria-label="次月">&gt;</button>
            </div>
            <div class="calendar-grid-header">
              <div>日</div>
              <div>月</div>
              <div>火</div>
              <div>水</div>
              <div>木</div>
              <div>金</div>
              <div>土</div>
            </div>
            <div class="calendar-grid" id="calendar-grid-days">
              <!-- JSで動的に描画されます -->
            </div>
          </div>
          <div class="calendar-sidebar">
            <h3>誕生日一覧</h3>
            <ul class="birthday-list" id="all-birthday-list">
              <!-- JSで動的にリストアップされます -->
            </ul>
            <button id="toggle-birthday-list-btn" class="toggle-bday-btn" style="display: none;">もっと見る ▼</button>
            <button id="download-ical-btn" class="download-ical-btn">📅 カレンダーを書き出す (.ics)</button>
          </div>
        </div>
      </section>

      <!-- 2. 身長比較 -->
      <section class="height-section" id="height-section" aria-label="身長比較">
        <h2>身長比較</h2>
        <div class="height-chart-wrapper">
          <div class="chart-container" id="chart-container">
            <!-- JSで動的に追加されます -->
          </div>
        </div>
      </section>

      <!-- 3. キャラ一覧 (検索とリスト) -->
      <section class="controls" aria-label="検索">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="キャラ名、誕生日、一人称、口癖で検索..." aria-label="キャラクター検索">
          <button id="clear-search-btn" class="clear-search-btn" aria-label="検索をクリア" style="display: none;">×</button>
        </div>
        <div class="stats-summary" id="stats-summary">
          <span>登録キャラ数: <strong id="total-count">0</strong>人</span>
          <span>身長判明: <strong id="known-height-count">0</strong>人</span>
        </div>
      </section>

      <section class="birthday-section" id="birthday-section" style="display: none;">
        <!-- 今月誕生日のキャラクターを表示 -->
      </section>

      <section class="grid" id="character-grid" aria-label="キャラクター一覧">
        <!-- JSで動的に追加されます -->
      </section>
    </main>

    <footer>
      <p>2026 ブラックチャンネル キャラクター情報 ファンサイト</p>
    </footer>
  </div>

  <!-- イベント詳細モーダル -->
  <div id="event-detail-modal" class="event-modal" aria-hidden="true" role="dialog" aria-labelledby="modal-date-title">
    <div id="event-modal-overlay" class="event-modal-overlay"></div>
    <div class="event-modal-content">
      <button id="close-modal-btn" class="close-modal-btn" aria-label="閉じる">&times;</button>
      <div class="modal-header">
        <h3 id="modal-date-title">イベント詳細</h3>
      </div>
      <div id="modal-body-content" class="modal-body">
        <!-- JSで詳細が動的に挿入されます -->
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
